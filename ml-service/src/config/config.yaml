app:
  name: "EcoWatch ML Service"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8001

model:
  path: "models/deforestation_model.keras"
  img_size: [64, 64]
  classes:
    - AnnualCrop
    - Forest
    - HerbaceousVegetation
    - Highway
    - Industrial
    - Pasture
    - PermanentCrop
    - Residential
    - River
    - SeaLake

sliding_window:
  tile_size: 80
  stride: 40
  alert_threshold: 55

kafka:
  broker: "kafka:9092"
  consumer_group: "ml-workers"
  topics:
    consume: "scan-jobs"
    produce: "scan-results"
